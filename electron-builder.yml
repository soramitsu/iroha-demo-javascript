appId: org.sora.wallet.demo
productName: TAIRA Wallet
directories:
  output: release
  buildResources: buildResources
afterPack: scripts/after-pack.mjs
files:
  - dist/**
  - package.json
extraResources:
  - from: dist-native/vpn/${os}
    to: vpn
    filter:
      - '**/*'
mac:
  category: public.app-category.finance
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: buildResources/entitlements.mac.plist
  entitlementsInherit: buildResources/entitlements.mac.plist
linux:
  target:
    - deb
    - rpm
  category: Utility
  maintainer: gucci-swallow <swallow965dev@gmail.com>
