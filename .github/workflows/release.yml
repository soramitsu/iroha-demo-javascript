name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to package, for example v2.0.1"
        required: true
      iroha_ref:
        description: "hyperledger-iroha/iroha ref to check out beside this repo"
        required: false
        default: "main"

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  IROHA_REF: ${{ github.event.inputs.iroha_ref || vars.IROHA_REF || 'main' }}
  APP_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  SORANET_VPN_HELPER_BUNDLE_ID: ${{ vars.SORANET_VPN_HELPER_BUNDLE_ID }}
  SORANET_VPN_PACKET_TUNNEL_BUNDLE_ID: ${{ vars.SORANET_VPN_PACKET_TUNNEL_BUNDLE_ID }}
  SORANET_VPN_APP_GROUP_ID: ${{ vars.SORANET_VPN_APP_GROUP_ID }}
  SORANET_VPN_MANAGER_DESCRIPTION: ${{ vars.SORANET_VPN_MANAGER_DESCRIPTION }}
  HAS_MAC_SIGNING: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 != '' && secrets.MAC_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEVELOPMENT_TEAM != '' && secrets.APPLE_API_KEY_P8_BASE64 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
  HAS_WIN_SIGNING: ${{ secrets.WIN_CSC_LINK != '' && secrets.WIN_CSC_KEY_PASSWORD != '' }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout wallet
        uses: actions/checkout@v4
        with:
          path: iroha-demo-javascript
          ref: ${{ env.APP_REF }}

      - name: Checkout Iroha SDK
        uses: actions/checkout@v4
        with:
          repository: hyperledger-iroha/iroha
          path: iroha
          ref: ${{ env.IROHA_REF }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: iroha-demo-javascript/package-lock.json

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install dependencies
        working-directory: iroha-demo-javascript
        run: npm ci

      - name: Verify
        working-directory: iroha-demo-javascript
        run: npm run verify

  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            arch: x64
            runner: macos-15-intel
          - platform: mac
            arch: arm64
            runner: macos-15
          - platform: win
            arch: x64
            runner: windows-latest
          - platform: linux
            arch: x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout wallet
        uses: actions/checkout@v4
        with:
          path: iroha-demo-javascript
          ref: ${{ env.APP_REF }}

      - name: Checkout Iroha SDK
        uses: actions/checkout@v4
        with:
          repository: hyperledger-iroha/iroha
          path: iroha
          ref: ${{ env.IROHA_REF }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: iroha-demo-javascript/package-lock.json

      - name: Set up Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install macOS packaging tools
        if: matrix.platform == 'mac'
        run: brew install xcodegen

      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libopenjp2-tools rpm

      - name: Report macOS signing mode
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          if [[ "$HAS_MAC_SIGNING" == "true" ]]; then
            echo "Building signed and notarized macOS artifacts."
          else
            echo "::warning::macOS signing/notarization secrets are missing. Building unsigned draft artifacts."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Report Windows signing mode
        if: matrix.platform == 'win'
        shell: bash
        run: |
          if [[ "$HAS_WIN_SIGNING" == "true" ]]; then
            echo "Building signed Windows artifacts."
          else
            echo "::warning::Windows signing secrets are missing. Building unsigned draft artifacts."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Prepare Windows signing certificate
        if: matrix.platform == 'win' && env.HAS_WIN_SIGNING == 'true'
        shell: pwsh
        env:
          WIN_CSC_LINK_SECRET: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CSC_LINK_SECRET))
          "WIN_CSC_LINK=$certPath" >> $env:GITHUB_ENV
          "WIN_CSC_KEY_PASSWORD=$env:WIN_CSC_KEY_PASSWORD_SECRET" >> $env:GITHUB_ENV

      - name: Prepare macOS signing and notarization
        if: matrix.platform == 'mac' && env.HAS_MAC_SIGNING == 'true'
        shell: bash
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_SIGN_IDENTITY_SECRET: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_XCODE_SIGN_IDENTITY_SECRET: ${{ secrets.APPLE_XCODE_SIGN_IDENTITY }}
        run: |
          cert_path="$RUNNER_TEMP/mac-codesign.p12"
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$MAC_CERTIFICATE_P12_BASE64" | base64 -D > "$cert_path"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$api_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          {
            echo "CSC_LINK=$cert_path"
            echo "CSC_KEY_PASSWORD=$MAC_CERTIFICATE_PASSWORD"
            echo "APPLE_DEVELOPMENT_TEAM=$APPLE_DEVELOPMENT_TEAM"
            echo "APPLE_API_KEY=$api_key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "APPLE_SIGN_IDENTITY=${APPLE_SIGN_IDENTITY_SECRET:-Developer ID Application}"
            echo "APPLE_XCODE_SIGN_IDENTITY=${APPLE_XCODE_SIGN_IDENTITY_SECRET:-Developer ID Application}"
            echo "APPLE_CODESIGN_TIMESTAMP=true"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: iroha-demo-javascript
        run: npm ci

      - name: Build macOS artifacts
        if: matrix.platform == 'mac'
        working-directory: iroha-demo-javascript
        run: npm run dist:mac -- --${{ matrix.arch }} --publish never

      - name: Build Windows artifacts
        if: matrix.platform == 'win'
        working-directory: iroha-demo-javascript
        run: npm run dist:win -- --${{ matrix.arch }} --publish never

      - name: Build Linux artifacts
        if: matrix.platform == 'linux'
        working-directory: iroha-demo-javascript
        run: npm run dist:linux -- --${{ matrix.arch }} --publish never

      - name: Collect release artifacts
        shell: bash
        working-directory: iroha-demo-javascript
        run: |
          mkdir -p artifact-output
          find release -maxdepth 1 -type f \( \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.rpm' -o \
            -name '*.zip' \
          \) -print0 | xargs -0 -I{} cp "{}" artifact-output/
          find artifact-output -type f -maxdepth 1 -print

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: iroha-demo-javascript/artifact-output/*
          if-no-files-found: error

  publish:
    name: Prepare keyless-signed draft GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SIGSTORE_CERTIFICATE_IDENTITY: "https://github.com/${{ github.workflow_ref }}"
      SIGSTORE_CERTIFICATE_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Validate immutable release ref and artifact inventory
        shell: bash
        run: |
          expected_ref="refs/tags/$RELEASE_TAG"
          if [[ "$GITHUB_REF" != "$expected_ref" ]]; then
            echo "::error::Keyless release signing requires the workflow itself to run from $expected_ref; got $GITHUB_REF."
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag is not a supported version tag: $RELEASE_TAG"
            exit 1
          fi

          release_version="${RELEASE_TAG#v}"
          mapfile -d '' release_files < <(
            find artifacts -maxdepth 1 -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.rpm' -o \
              -name '*.zip' \
            \) -print0 | sort -z
          )
          if (( ${#release_files[@]} == 0 )); then
            echo "::error::No distributable release artifacts were downloaded."
            exit 1
          fi

          for file in "${release_files[@]}"; do
            name="$(basename "$file")"
            if [[ "$name" != "SORA-Wallet-$release_version-"* ]]; then
              echo "::error::Artifact $name does not match release $RELEASE_TAG."
              exit 1
            fi
          done

          duplicate_names="$(
            printf '%s\n' "${release_files[@]##*/}" | sort | uniq -d
          )"
          if [[ -n "$duplicate_names" ]]; then
            echo "::error::Duplicate release artifact names were merged:"
            printf '%s\n' "$duplicate_names"
            exit 1
          fi

      - name: Create checksum manifest
        shell: bash
        run: |
          find artifacts -maxdepth 1 -type f \( \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.rpm' -o \
            -name '*.zip' \
          \) -print0 | sort -z | while IFS= read -r -d '' file; do
            (cd "$(dirname "$file")" && shasum -a 256 "$(basename "$file")")
          done > artifacts/SHA256SUMS.txt
          test -s artifacts/SHA256SUMS.txt

      - name: Create or update draft release
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --draft --verify-tag --title "$RELEASE_TAG" --generate-notes
          elif [[ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" != "true" ]]; then
            echo "::error::Refusing to replace assets on an already-published release."
            exit 1
          fi

      - name: Upload draft distributables and checksums
        shell: bash
        run: |
          upload_with_retry() {
            local file="$1"
            local attempt
            for attempt in 1 2 3; do
              if gh release upload "$RELEASE_TAG" "$file" --clobber; then
                return 0
              fi
              if (( attempt < 3 )); then
                sleep "$((attempt * 2))"
              fi
            done
            echo "::error::Failed to upload $file after 3 attempts."
            return 1
          }

          while IFS= read -r -d '' file; do
            upload_with_retry "$file"
          done < <(
            find artifacts -maxdepth 1 -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.rpm' -o \
              -name '*.zip' \
            \) -print0 | sort -z
          )
          upload_with_retry artifacts/SHA256SUMS.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign release artifacts with GitHub OIDC
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            cosign sign-blob "$file" \
              --bundle "$file.sigstore.json" \
              --yes
          done < <(
            find artifacts -maxdepth 1 -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.rpm' -o \
              -name '*.zip' \
              -o -name 'SHA256SUMS.txt' \
            \) -print0 | sort -z
          )

      - name: Verify every Sigstore bundle
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            bundle="$file.sigstore.json"
            test -s "$bundle"
            cosign verify-blob "$file" \
              --bundle "$bundle" \
              --certificate-identity "$SIGSTORE_CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer "$SIGSTORE_CERTIFICATE_OIDC_ISSUER" \
              --certificate-github-workflow-ref "$GITHUB_REF" \
              --certificate-github-workflow-repository "$GITHUB_REPOSITORY" \
              --certificate-github-workflow-sha "$GITHUB_SHA"
          done < <(
            find artifacts -maxdepth 1 -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.rpm' -o \
              -name '*.zip' \
              -o -name 'SHA256SUMS.txt' \
            \) -print0 | sort -z
          )

      - name: Write Sigstore verification instructions
        shell: bash
        run: |
          {
            cat <<'EOF'
          # Verify SORA Wallet release artifacts

          These bundles provide Sigstore keyless provenance from the tagged
          GitHub Actions release workflow. They do not provide macOS
          notarization or Windows Authenticode signing.

          Install Cosign, download an artifact and its adjacent
          `.sigstore.json` bundle, then run:

          ```bash
          EOF
            printf "certificate_identity='%s'\n" "$SIGSTORE_CERTIFICATE_IDENTITY"
            printf "certificate_oidc_issuer='%s'\n" "$SIGSTORE_CERTIFICATE_OIDC_ISSUER"
            printf "certificate_github_workflow_ref='%s'\n" "$GITHUB_REF"
            printf "certificate_github_workflow_repository='%s'\n" "$GITHUB_REPOSITORY"
            printf "certificate_github_workflow_sha='%s'\n" "$GITHUB_SHA"
            printf "artifact='SORA-Wallet-%s-<os>-<arch>.<ext>'\n" "${RELEASE_TAG#v}"
            cat <<'EOF'

          cosign verify-blob "$artifact" \
            --bundle "$artifact.sigstore.json" \
            --certificate-identity "$certificate_identity" \
            --certificate-oidc-issuer "$certificate_oidc_issuer" \
            --certificate-github-workflow-ref "$certificate_github_workflow_ref" \
            --certificate-github-workflow-repository "$certificate_github_workflow_repository" \
            --certificate-github-workflow-sha "$certificate_github_workflow_sha"

          cosign verify-blob SHA256SUMS.txt \
            --bundle SHA256SUMS.txt.sigstore.json \
            --certificate-identity "$certificate_identity" \
            --certificate-oidc-issuer "$certificate_oidc_issuer" \
            --certificate-github-workflow-ref "$certificate_github_workflow_ref" \
            --certificate-github-workflow-repository "$certificate_github_workflow_repository" \
            --certificate-github-workflow-sha "$certificate_github_workflow_sha"

          shasum -a 256 -c SHA256SUMS.txt
          ```
          EOF
          } > artifacts/SIGSTORE-VERIFY.md

      - name: Upload Sigstore bundles and verification instructions
        shell: bash
        run: |
          upload_with_retry() {
            local file="$1"
            local attempt
            for attempt in 1 2 3; do
              if gh release upload "$RELEASE_TAG" "$file" --clobber; then
                return 0
              fi
              if (( attempt < 3 )); then
                sleep "$((attempt * 2))"
              fi
            done
            echo "::error::Failed to upload $file after 3 attempts."
            return 1
          }

          while IFS= read -r -d '' bundle; do
            upload_with_retry "$bundle"
          done < <(
            find artifacts -maxdepth 1 -type f -name '*.sigstore.json' -print0 | sort -z
          )
          upload_with_retry artifacts/SIGSTORE-VERIFY.md

      - name: Verify draft release asset inventory
        shell: bash
        run: |
          expected_assets="$(mktemp)"
          remote_assets="$(mktemp)"

          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            printf '%s\n' "$name" "$name.sigstore.json"
          done < <(
            find artifacts -maxdepth 1 -type f \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.rpm' -o \
              -name '*.zip' \
            \) -print0 | sort -z
          ) > "$expected_assets"
          printf '%s\n' \
            'SHA256SUMS.txt' \
            'SHA256SUMS.txt.sigstore.json' \
            'SIGSTORE-VERIFY.md' >> "$expected_assets"
          sort -u -o "$expected_assets" "$expected_assets"

          gh release view "$RELEASE_TAG" --json assets \
            --jq '.assets[].name' | sort -u > "$remote_assets"
          if ! diff -u "$expected_assets" "$remote_assets"; then
            echo "::error::Draft release assets do not exactly match the verified local inventory."
            exit 1
          fi

          if [[ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" != "true" ]]; then
            echo "::error::Release must remain a draft after signing and verification."
            exit 1
          fi
